name: Daily Flight Report

on:
  schedule:
    - cron: "30 16 * * *"   # ساعت ۲۰ ایران (UTC+3:30)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python main.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: flight-report
          path: reports/
