name: Daily Mehrabad Flights

on:
  schedule:
    - cron: '0 8 * * *'     # هر روز ساعت ۸:۳۰ صبح به وقت تهران
  workflow_dispatch:        # دکمه دستی برای تست

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python main.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "Update flight stats - $(date)" || echo "No changes"
          git push
